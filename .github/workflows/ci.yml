name: CI

# Run tests on every PR; test + deploy to prod when main moves.
on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Lint
        run: ruff check src tests
      - name: Unit + schema + data-quality tests
        run: pytest -q
        env:
          PYTHONPATH: src

  deploy-prod:
    needs: test                       # gate: only deploy if tests pass
    # Skipped by default so the build stays green. To run the real deploy demo:
    #   1) add repo secrets DATABRICKS_HOST + DATABRICKS_TOKEN
    #   2) set the workspace host in databricks.yml
    #   3) add a repo VARIABLE  DEPLOY_ENABLED = true  (Settings -> Variables -> Actions)
    # Student forks never run this (different repository, no variable).
    if: >
      github.ref == 'refs/heads/main' &&
      github.repository == 'santitham/orders_pipeline' &&
      vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - name: Deploy bundle to prod
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks bundle deploy -t prod
